name: Build and deploy sheets

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; cancel superseded runs
concurrency:
  group: pages
  cancel-in-progress: true

# Run JS actions (checkout/setup-node/upload-pages-artifact) on Node.js 24.
# Node 20 is deprecated on the runners (forced default 2026-06-16, removed 2026-09-16).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Check effects compile to golden
        run: node src/builder/compile.mjs --check src/builder/golden.json src/characters/*.json
      - name: Build character sheets
        run: node src/build.mjs
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
